services:
  # Database: PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: nestjs-postgres
    restart: always
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password_rahasia
      POSTGRES_DB: db_project
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Caching: Redis
  redis:
    image: redis:7-alpine
    container_name: nestjs-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # Object Storage: MinIO
  minio:
    image: minio/minio
    container_name: nestjs-minio
    restart: always
    ports:
      - '9000:9000' 
      - '9001:9001' 
    environment:
      MINIO_ROOT_USER: minio_user
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:

