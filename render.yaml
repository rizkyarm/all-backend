services:
  # ─── NestJS API ──────────────────────────────────────────
  - type: web
    name: all-backend-api
    runtime: docker
    repo: https://github.com/rizkyarm/all-backend.git
    branch: main
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      # ── Supabase PostgreSQL ──────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: supabase-postgres
          property: connectionString

      # ── Supabase Storage ──────────────────────────────────
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: "443"
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET_NAME
        value: my-bucket
      - key: MINIO_USE_SSL
        value: "true"
      - key: MINIO_PUBLIC_ENDPOINT
        sync: false
      - key: MINIO_PUBLIC_PORT
        value: "443"

      # ── Upstash Redis ─────────────────────────────────────
      - key: REDIS_URL
        sync: false

      # ── JWT ───────────────────────────────────────────────
      # Generate with: openssl rand -hex 64
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRATION
        value: "15m"
      - key: JWT_REFRESH_EXPIRATION
        value: "7d"

      # ── App ───────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: FRONTEND_URL
        value: "*"
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
